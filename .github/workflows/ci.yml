name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  # Weekly full run: runner-image drift (ffmpeg, shellcheck, codecs) breaks
  # things without any push. Path filters are bypassed on schedule.
  schedule:
    - cron: '17 11 * * 1'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    # Scheduled runs treat everything as changed (no diff to filter against).
    outputs:
      lib: ${{ github.event_name == 'schedule' && 'true' || steps.filter.outputs.lib }}
      conversion: ${{ github.event_name == 'schedule' && 'true' || steps.filter.outputs.conversion }}
      util: ${{ github.event_name == 'schedule' && 'true' || steps.filter.outputs.util }}
      tests: ${{ github.event_name == 'schedule' && 'true' || steps.filter.outputs.tests }}
      code: ${{ github.event_name == 'schedule' && 'true' || steps.filter.outputs.code }}
      conversion_tools: ${{ steps.plan.outputs.conversion_tools }}
      util_tools: ${{ steps.plan.outputs.util_tools }}
      conversion_matrix: ${{ steps.plan.outputs.conversion_matrix }}
      util_matrix: ${{ steps.plan.outputs.util_matrix }}
    steps:
      # Needed for push events; PRs can use the GitHub API without a checkout.
      - name: Checkout
        uses: actions/checkout@v7

      - name: Path filter
        if: github.event_name != 'schedule'
        uses: dorny/paths-filter@v4
        id: filter
        with:
          list-files: json
          filters: |
            lib:
              - 'lib/**'
              - 'Makefile'
              - '.github/workflows/ci.yml'
              - 'scripts/**'
              - '.github/actions/**'
            conversion:
              - 'conversion/**'
            util:
              - 'util/**'
            tests:
              - 'tests/**'
            code:
              - 'lib/**'
              - 'conversion/**'
              - 'util/**'
              - 'tests/**'
              - 'Makefile'
              - '.github/workflows/ci.yml'
              - 'scripts/**'
              - '.github/actions/**'

      - name: Plan shellcheck matrices
        id: plan
        env:
          LIB_CHANGED: ${{ github.event_name == 'schedule' && 'true' || steps.filter.outputs.lib }}
          CONVERSION_CHANGED: ${{ steps.filter.outputs.conversion }}
          UTIL_CHANGED: ${{ steps.filter.outputs.util }}
          CONVERSION_FILES: ${{ steps.filter.outputs.conversion_files }}
          UTIL_FILES: ${{ steps.filter.outputs.util_files }}
        run: |
          set -euo pipefail

          plan_group() {
            local group="$1"
            local group_changed="$2"
            local files_json="$3"
            local -a tools=()

            # A tool dir is any dir under the group holding a Makefile
            # (conversion/<tool> or util/<category>/<tool>).
            if [[ "$LIB_CHANGED" == "true" ]]; then
              mapfile -t tools < <(
                find "$group" -mindepth 2 -maxdepth 3 -name Makefile -printf '%h\n' | sort
              )
            elif [[ "$group_changed" == "true" ]]; then
              mapfile -t tools < <(
                jq -r '.[]' <<<"$files_json" | while IFS= read -r f; do
                  d=$(dirname "$f")
                  # Nearest ancestor with a Makefile = the tool dir. Stops at
                  # the group root, so deleted tools and category-level files
                  # are skipped.
                  while [[ "$d" == "$group"/* ]]; do
                    if [[ -f "$d/Makefile" ]]; then
                      printf '%s\n' "$d"
                      break
                    fi
                    d=$(dirname "$d")
                  done
                done | sort -u
              )
            fi

            local count=${#tools[@]}
            local tools_json matrix_json
            if ((count == 0)); then
              tools_json='[]'
              # Always a valid include[] entry so fromJSON never sees "".
              matrix_json='[{"shard":0,"shards":1}]'
            else
              tools_json="$(printf '%s\n' "${tools[@]}" | jq -R . | jq -s -c .)"
              local shards=1
              if ((count > 8)); then
                shards=4
              elif ((count > 3)); then
                shards=2
              fi
              matrix_json="$(jq -c -n --argjson n "$shards" \
                '[range($n) | {shard: ., shards: $n}]')"
            fi

            # Single-line outputs (avoid heredoc/newline surprises with fromJSON).
            printf '%s_tools=%s\n' "$group" "$tools_json" >>"$GITHUB_OUTPUT"
            printf '%s_matrix=%s\n' "$group" "$matrix_json" >>"$GITHUB_OUTPUT"

            echo "${group}: ${count} tool(s), matrix=${matrix_json}"
          }

          plan_group conversion "$CONVERSION_CHANGED" "$CONVERSION_FILES"
          plan_group util "$UTIL_CHANGED" "$UTIL_FILES"

  shellcheck-lib:
    name: shellcheck (lib)
    needs: changes
    if: needs.changes.outputs.lib == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install shellcheck
        uses: ./.github/actions/install-shellcheck

      - name: shellcheck lib
        run: make check-lib

  shellcheck-conversion:
    name: shellcheck (conversion ${{ matrix.shard }}/${{ matrix.shards }})
    needs: changes
    if: >-
      needs.changes.outputs.conversion == 'true' ||
      needs.changes.outputs.lib == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.changes.outputs.conversion_matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install shellcheck
        uses: ./.github/actions/install-shellcheck

      - name: shellcheck conversion tools
        env:
          TOOLS_JSON: ${{ needs.changes.outputs.conversion_tools }}
          SHARD: ${{ matrix.shard }}
          SHARDS: ${{ matrix.shards }}
        run: |
          set -euo pipefail
          jq -r --argjson s "$SHARD" --argjson n "$SHARDS" \
            'to_entries[] | select((.key % $n) == $s) | .value' \
            <<<"$TOOLS_JSON" >.ci-tools.txt
          if [[ ! -s .ci-tools.txt ]]; then
            echo "No tools for this shard"
            exit 0
          fi
          echo "Shard $SHARD/$SHARDS:"
          cat .ci-tools.txt
          xargs -a .ci-tools.txt -P"$(nproc)" -I{} make -C {} check

  shellcheck-util:
    name: shellcheck (util ${{ matrix.shard }}/${{ matrix.shards }})
    needs: changes
    if: >-
      needs.changes.outputs.util == 'true' ||
      needs.changes.outputs.lib == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.changes.outputs.util_matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install shellcheck
        uses: ./.github/actions/install-shellcheck

      - name: shellcheck util tools
        env:
          TOOLS_JSON: ${{ needs.changes.outputs.util_tools }}
          SHARD: ${{ matrix.shard }}
          SHARDS: ${{ matrix.shards }}
        run: |
          set -euo pipefail
          jq -r --argjson s "$SHARD" --argjson n "$SHARDS" \
            'to_entries[] | select((.key % $n) == $s) | .value' \
            <<<"$TOOLS_JSON" >.ci-tools.txt
          if [[ ! -s .ci-tools.txt ]]; then
            echo "No tools for this shard"
            exit 0
          fi
          echo "Shard $SHARD/$SHARDS:"
          cat .ci-tools.txt
          xargs -a .ci-tools.txt -P"$(nproc)" -I{} make -C {} check

  # Cross-distro smoke: Fedora ShellCheck + full make check (lib change or workflow).
  shellcheck-fedora:
    name: shellcheck (Fedora)
    needs: changes
    if: needs.changes.outputs.lib == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container: fedora:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install ShellCheck
        run: dnf install -y ShellCheck make findutils

      - name: shellcheck lib + all tools
        run: make check

  # Unit + smoke tests: cheap, run on any code change.
  test-unit-smoke:
    name: tests (unit + smoke)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg flac

      - name: Install shellcheck
        uses: ./.github/actions/install-shellcheck

      - name: shellcheck test suite
        run: make check-tests

      - name: Run unit + smoke tests
        run: make test

      # Fails when a tool lacks functional coverage (and is not exempted in
      # tests/coverage-exempt.tsv) or when exempt entries go stale.
      - name: Coverage audit
        run: make coverage

  # Functional tests: heavier fixtures/codecs, sharded across runners and
  # run against both ffmpeg ends we support: the distro's (oldest we care
  # about) and the current upstream release (matches dev machines). Version
  # skew here has produced real bugs (ffmpeg 6.1 truncating decodes when
  # fd 0 was closed) that only one end of the range could catch.
  # Encoders missing from the runner's ffmpeg exercise the SKIP path.
  test-functional:
    name: tests (functional ${{ matrix.shard }}/2, ffmpeg ${{ matrix.ffmpeg }})
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1]
        ffmpeg: [apt, latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg flac bpm-tools musepack-tools libchromaprint-tools \
            cmake g++ unzip zip rsgain pkg-config git sox libsox-fmt-all \
            libfftw3-dev libavcodec-dev libavformat-dev libavutil-dev libswresample-dev

      # BtbN static build of the latest upstream release; shadows apt's
      # ffmpeg/ffprobe via /usr/local/bin PATH precedence.
      - name: Install latest ffmpeg (static build)
        if: matrix.ffmpeg == 'latest'
        run: |
          set -euo pipefail
          curl -fsSL --retry 3 -o /tmp/ffmpeg.tar.xz \
            "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz"
          tar -xJf /tmp/ffmpeg.tar.xz -C /tmp
          sudo install -m 0755 /tmp/ffmpeg-master-latest-linux64-gpl/bin/{ffmpeg,ffprobe} /usr/local/bin/
          ffmpeg -version | head -1

      # Best effort: enables the gated flac-to-ape tests (they skip without
      # mac). The installer itself is tested offline in ape-codec.test.sh, so
      # an unreachable monkeysaudio.com must not fail CI.
      - name: Install APE codec (best effort)
        continue-on-error: true
        run: bash scripts/ape-codec.sh install --prefix "$HOME/.local"

      # Best effort: keyfinder-cli is not in Ubuntu apt. Build from source so
      # audio-key tests can run; on failure they SKIP (MAX_SKIPS still applies).
      - name: Install keyfinder-cli (best effort)
        continue-on-error: true
        run: bash scripts/keyfinder-cli.sh install --prefix "$HOME/.local"

      # Always expose ~/.local for mac / keyfinder even if a best-effort step failed.
      - name: Export ~/.local for optional tools
        run: |
          echo "$HOME/.local/bin" >>"$GITHUB_PATH"
          echo "LD_LIBRARY_PATH=$HOME/.local/lib:$HOME/.local/lib/x86_64-linux-gnu:${LD_LIBRARY_PATH:-}" >>"$GITHUB_ENV"

      - name: Warn if optional codecs missing
        run: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"
          export LD_LIBRARY_PATH="$HOME/.local/lib:$HOME/.local/lib/x86_64-linux-gnu:${LD_LIBRARY_PATH:-}"
          missing=()
          command -v mac >/dev/null 2>&1 || missing+=(mac)
          command -v keyfinder-cli >/dev/null 2>&1 || missing+=(keyfinder-cli)
          if ((${#missing[@]} > 0)); then
            echo "::warning::optional tools not on PATH (${missing[*]}); related tests will SKIP toward MAX_SKIPS"
          else
            echo "optional tools present: mac keyfinder-cli"
          fi

      # Fixtures are deterministic per (generator script, ffmpeg build).
      - name: Fixture cache key
        id: ffver
        run: echo "ffmpeg=$(ffmpeg -version | head -1 | awk '{print $3}')" >>"$GITHUB_OUTPUT"

      - name: Cache test fixtures
        uses: actions/cache@v6
        with:
          path: tests/.cache
          key: fixtures-${{ hashFiles('tests/fixtures.sh') }}-ffmpeg-${{ steps.ffver.outputs.ffmpeg }}

      - name: Run functional shard
        env:
          SHARD: ${{ matrix.shard }}
          SHARDS: 2
        run: |
          set -euo pipefail
          mapfile -t files < <(bash tests/run.sh --list functional)
          declare -a mine=()
          for i in "${!files[@]}"; do
            if (( i % SHARDS == SHARD )); then
              mine+=("${files[$i]}")
            fi
          done
          if ((${#mine[@]} == 0)); then
            echo "No files for this shard"
            exit 0
          fi
          printf 'Shard %s/%s:\n' "$SHARD" "$SHARDS"
          printf '  %s\n' "${mine[@]}"
          bash tests/run.sh "${mine[@]}" 2>&1 | tee test-output.log

      # Skips are how coverage erodes silently (a dependency vanishes from
      # the image and its tests stop running). Surface them on the run page,
      # fail on unexpected skip reasons, and fail if the count grows past baseline.
      - name: Skip report
        if: always()
        env:
          MAX_SKIPS: 10
        run: |
          set -euo pipefail
          [[ -f test-output.log ]] || exit 0
          skips=$(grep -c '# SKIP' test-output.log || true)
          {
            echo "### Skipped tests: ${skips} (shard ${{ matrix.shard }}, ffmpeg ${{ matrix.ffmpeg }})"
            grep '# SKIP' test-output.log | sed 's/^ *//; s/^/- /' || true
          } >>"$GITHUB_STEP_SUMMARY"

          unexpected=0
          while IFS= read -r line; do
            [[ -n "$line" ]] || continue
            case "$line" in
              *'missing dependency:'*|\
              *'ffmpeg lacks'*|\
              *'no fpcalc'*|\
              *'no python3'*|\
              *'no mac binary'*|\
              *'no mpcenc'*|\
              *'no bpm'*|\
              *'no rsgain'*|\
              *'no C++ compiler'*|\
              *'running as root'*|\
              *'fixture build failed'*|\
              *'sox lacks dff'*)
                ;;
              *)
                echo "::error::Unexpected skip (not in allowlist): $line"
                unexpected=1
                ;;
            esac
          done < <(grep '# SKIP' test-output.log || true)
          if ((unexpected)); then
            exit 1
          fi
          if ((skips > MAX_SKIPS)); then
            echo "::error::$skips skipped tests exceeds MAX_SKIPS=$MAX_SKIPS — missing dependency on the runner?"
            exit 1
          fi

  # Single required status for branch protection when path filters skip jobs.
  ci:
    name: CI
    timeout-minutes: 5
    needs:
      - changes
      - shellcheck-lib
      - shellcheck-conversion
      - shellcheck-util
      - shellcheck-fedora
      - test-unit-smoke
      - test-functional
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate results
        run: |
          set -euo pipefail
          results=(
            "${{ needs.changes.result }}"
            "${{ needs.shellcheck-lib.result }}"
            "${{ needs.shellcheck-conversion.result }}"
            "${{ needs.shellcheck-util.result }}"
            "${{ needs.shellcheck-fedora.result }}"
            "${{ needs.test-unit-smoke.result }}"
            "${{ needs.test-functional.result }}"
          )
          for r in "${results[@]}"; do
            case "$r" in
              success|skipped) ;;
              *)
                echo "Required job finished with: $r"
                exit 1
                ;;
            esac
          done
          echo "All required jobs passed or were skipped by path filters."
