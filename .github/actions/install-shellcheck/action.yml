name: Install ShellCheck
description: >-
  Install a pinned upstream ShellCheck release binary. Ubuntu noble's apt
  package is 0.9.0, which emits SC2317 false positives fixed upstream.

inputs:
  version:
    description: ShellCheck release tag
    default: v0.11.0
  sha256:
    description: sha256 of the linux.x86_64 release tarball
    default: 8c3be12b05d5c177a04c29e3c78ce89ac86f1595681cab149b65b97c4e227198

runs:
  using: composite
  steps:
    - name: Download and install shellcheck
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
        SHA256: ${{ inputs.sha256 }}
      run: |
        set -euo pipefail
        url="https://github.com/koalaman/shellcheck/releases/download/${VERSION}/shellcheck-${VERSION}.linux.x86_64.tar.xz"
        curl -fsSL --retry 3 -o /tmp/shellcheck.tar.xz "$url"
        echo "${SHA256}  /tmp/shellcheck.tar.xz" | sha256sum -c -
        tar -xJf /tmp/shellcheck.tar.xz -C /tmp
        sudo install -m 0755 "/tmp/shellcheck-${VERSION}/shellcheck" /usr/local/bin/shellcheck
        shellcheck --version
